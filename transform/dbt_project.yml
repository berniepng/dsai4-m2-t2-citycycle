# dbt_project.yml
# ================
# CityCycle London — dbt transformation project
#
# Model materialisation strategy:
#   staging/     → views     (cheap, always fresh)
#   intermediate/→ views     (cheap, always fresh)
#   marts/       → tables    (materialised for fast dashboard queries)
#
# Dev safety: +limit: 1000 applied to all dev models via var
# Production: no limit applied

name: citycycle
version: "1.0.0"
config-version: 2

profile: citycycle

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

# ── Global variables ─────────────────────────────────────────────
vars:
  # Override in dev profile to limit row scans
  dev_limit: 1000
  is_dev: false

# ── Model config by layer ─────────────────────────────────────────
models:
  citycycle:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]
      # Partition and cluster fact table for rebalancing queries
      fact_rides:
        +partition_by:
          field: hire_date
          data_type: date
          granularity: day
        +cluster_by: ["start_station_id", "end_station_id"]

# ── Seed config (for reference data like UK bank holidays) ────────
seeds:
  citycycle:
    +schema: seeds

# ── Snapshot config (future use — station dock changes) ──────────
snapshots:
  citycycle:
    +target_schema: snapshots
