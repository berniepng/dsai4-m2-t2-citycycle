# orchestration/workspace.yaml
# ==============================
# Dagster workspace — single entry point via Definitions object.
#
# Start the Dagster UI:
#   cd <repo-root>
#   dagster dev -f orchestration/jobs/citycycle_pipeline_job.py
#
# Then open: http://localhost:3000

load_from:
  - python_file:
      relative_path: orchestration/jobs/citycycle_pipeline_job.py
      working_directory: .
      executable_path: python
      attribute: defs
