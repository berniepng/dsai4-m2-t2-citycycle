# checkpoints/post_ingest.yml
# =============================
# Runs after Meltano loads raw data into BigQuery.
# Validates raw.cycle_hire and raw.cycle_stations.
# Pipeline is BLOCKED if any expectation fails.

name: post_ingest
config_version: 1.0
class_name: SimpleCheckpoint

validations:
  - batch_request:
      datasource_name: bigquery_raw
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: cycle_hire
    expectation_suite_name: raw_cycle_hire_suite
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction
      - name: send_slack_notification_on_failure
        action:
          class_name: SlackNotificationAction
          slack_webhook: "${SLACK_WEBHOOK_URL}"
          notify_on: failure
          show_failed_expectations: true

  - batch_request:
      datasource_name: bigquery_raw
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: cycle_stations
    expectation_suite_name: raw_cycle_stations_suite
    action_list:
      - name: store_validation_result
        action:
          class_name: StoreValidationResultAction
      - name: update_data_docs
        action:
          class_name: UpdateDataDocsAction
